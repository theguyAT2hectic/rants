title = "2 Hectic"
theme = "PaperMod"

[build]
  [build.cachebusters]
    source = ""
    target = ""
[params]


[params]
  author = "J. McMullen"
  description = "Philosophy, recovery, politics, and other528 528 digressions."
  ShowReadingTime = true
  ShowPostNavLinks = true
